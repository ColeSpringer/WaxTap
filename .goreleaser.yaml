# GoReleaser configuration for WaxTap. Validate with `goreleaser check`.
# Builds are pure Go (CGO disabled); release with `git tag vX.Y.Z && git push --tags`
# (the release workflow runs goreleaser) or locally with `goreleaser release --clean`.
version: 2

project_name: waxtap

before:
  hooks:
    - go mod tidy

builds:
  - id: waxtap
    main: ./cmd/waxtap
    binary: waxtap
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    # main.version is the var the version subcommand reads; injecting it here
    # makes release binaries report their tag even without module build info.
    ldflags:
      - -s -w -X main.version={{ .Version }}
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: waxtap
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE
      - MAINTENANCE.md

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  # Release notes are hand-written on the draft before publishing.
  disable: true

release:
  draft: true
  prerelease: auto
