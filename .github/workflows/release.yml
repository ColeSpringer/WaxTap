name: release

# Publishes release binaries (Linux/macOS/Windows, amd64/arm64) with GoReleaser
# when a version tag is pushed. The GitHub release is created as a draft (see
# .goreleaser.yaml) for a final review before publishing.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub release and upload assets

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # GoReleaser needs full history and tags for the changelog

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
